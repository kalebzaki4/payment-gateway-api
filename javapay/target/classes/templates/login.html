<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaPay - Login</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <style>
        body {
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--color-white);
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: var(--spacing-3xl);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-3xl);
        }

        .login-logo {
            font-size: 2.5rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-purple-600);
            margin-bottom: var(--spacing-md);
        }

        .login-title {
            margin: 0;
            font-size: 1.5rem;
            color: var(--color-gray-900);
        }

        .login-subtitle {
            margin-top: var(--spacing-sm);
            color: var(--color-gray-500);
            font-size: 0.875rem;
        }

        .login-form .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .login-form .form-group:last-of-type {
            margin-bottom: var(--spacing-2xl);
        }

        .login-button {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
        }

        .login-divider {
            text-align: center;
            color: var(--color-gray-400);
            font-size: 0.875rem;
            margin: var(--spacing-xl) 0;
        }

        .login-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--spacing-md);
            font-size: 0.875rem;
        }

        .login-links a {
            color: var(--color-purple-600);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .login-links a:hover {
            color: var(--color-purple-700);
            text-decoration: underline;
        }

        .login-footer {
            text-align: center;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-gray-200);
            color: var(--color-gray-500);
            font-size: 0.75rem;
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: var(--spacing-md);
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-gray-400);
            pointer-events: none;
        }

        .input-group input {
            padding-left: 2.5rem;
        }

        .password-toggle {
            position: absolute;
            right: var(--spacing-md);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-gray-400);
            padding: 0;
        }

        .password-toggle:hover {
            color: var(--color-gray-600);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: var(--spacing-xl);
            }

            .login-header {
                margin-bottom: var(--spacing-2xl);
            }

            .login-logo {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card animate-fade-in">
            <div class="login-header">
                <div class="login-logo">💳</div>
                <h1 class="login-title">JavaPay</h1>
                <p class="login-subtitle">Gateway de Pagamento Seguro</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-group">
                        <span class="input-icon">✉</span>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="seu@email.com"
                            required
                        >
                    </div>
                    <div class="form-error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Sua senha segura"
                            required
                        >
                        <button
                            type="button"
                            class="password-toggle"
                            aria-label="Mostrar/Ocultar senha"
                            id="passwordToggle"
                        >
                            👁
                        </button>
                    </div>
                    <div class="form-error" id="passwordError"></div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    Entrar
                </button>

                <div class="login-links">
                    <a href="/app/register">Criar conta</a>
                    <a href="/app/forgot-password">Esqueceu a senha?</a>
                </div>
            </form>

            <div class="login-divider">OU</div>

            <button class="btn btn-secondary btn-block">
                Continuar com Google
            </button>

            <div class="login-footer">
                Ao fazer login, você concorda com nossos <a href="#" style="color: var(--color-purple-600);">Termos de Serviço</a>
            </div>
        </div>
    </div>

    <script src="/js/components.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');

        // Password toggle
        passwordToggle.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            passwordToggle.textContent = type === 'password' ? '👁' : '🙈';
        });

        // Form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const validation = FormValidator.validate(loginForm, {
                email: ['required', 'email'],
                password: ['required', 'password']
            });

            if (!validation.isValid) {
                Object.entries(validation.errors).forEach(([field, error]) => {
                    document.getElementById(`${field}Error`).textContent = error;
                });
                return;
            }

            const submitButton = loginForm.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Entrando...';

            try {
                const response = await APIClient.post('/api/auth/login', {
                    email: loginForm.email.value,
                    password: loginForm.password.value
                });

                // Mock: Simulating successful login
                StorageHelper.setUser({ id: 1, email: loginForm.email.value });
                StorageHelper.setToken('mock-jwt-token');

                UIComponent.showToast('Login realizado com sucesso!', 'success');

                setTimeout(() => {
                    window.location.href = '/app/dashboard';
                }, 1000);
            } catch (error) {
                UIComponent.showToast('Email ou senha incorretos', 'error');
                submitButton.disabled = false;
                submitButton.textContent = 'Entrar';
            }
        });

        // Clear error messages on input
        ['email', 'password'].forEach(fieldName => {
            document.getElementById(fieldName).addEventListener('input', () => {
                document.getElementById(`${fieldName}Error`).textContent = '';
            });
        });
    </script>
</body>
</html>
