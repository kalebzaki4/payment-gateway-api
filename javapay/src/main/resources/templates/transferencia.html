<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaPay - Transferir</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { DEFAULT: '#820AD1' } },
                    boxShadow: { soft: '0 10px 60px -20px rgba(0,0,0,0.4)' }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #020617; }
        .input-focus:focus { 
            outline: none; 
            border-color: rgba(130,10,209,0.4);
            box-shadow: 0 0 0 4px rgba(130,10,209,0.1);
        }
    </style>
</head>
<body class="min-h-screen">
    
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-2xl border-b border-white/5">
        <div class="max-w-3xl mx-auto px-8 py-6">
            <div class="flex items-center justify-between">
                <a th:href="@{/dashboard}" class="flex items-center gap-4">
                    <div class="flex items-center justify-center w-12 h-12 rounded-2xl bg-white/5 border border-white/10">
                        <i class="ph ph-arrow-left text-2xl text-zinc-400"></i>
                    </div>
                    <span class="text-lg font-semibold text-white">Voltar</span>
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="p-3 rounded-2xl hover:bg-white/5 text-zinc-400 hover:text-red-400 transition-colors">
                        <i class="ph ph-sign-out text-xl"></i>
                    </button>
                </form>
            </div>
        </div>
    </nav>
    
    <!-- Main -->
    <main class="max-w-3xl mx-auto px-8 py-12">
        
        <!-- Header -->
        <div class="mb-12">
            <h1 class="text-3xl font-semibold text-white mb-3">Nova transferência</h1>
            <p class="text-zinc-400">Envie dinheiro para quem você quiser</p>
        </div>
        
        <!-- Form -->
        <form th:action="@{/transferencia}" method="post" class="space-y-8">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <!-- Recipient -->
            <div class="space-y-3">
                <label class="text-sm font-medium text-zinc-300">Destinatário</label>
                <div class="relative">
                    <i class="ph ph-user absolute left-5 top-1/2 -translate-y-1/2 text-zinc-500 text-2xl"></i>
                    <input type="text" name="destinatario" required placeholder="Chave Pix ou email"
                           class="input-focus w-full pl-14 pr-6 py-5 bg-zinc-900/50 border border-white/10 rounded-2xl text-white placeholder-zinc-600 text-base transition-all duration-200">
                </div>
            </div>
            
            <!-- Amount -->
            <div class="space-y-3">
                <label class="text-sm font-medium text-zinc-300">Valor</label>
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 text-3xl font-light">R$</span>
                    <input type="number" name="valor" id="valor" required placeholder="0,00" step="0.01"
                           class="input-focus w-full pl-20 pr-6 py-6 bg-zinc-900/50 border border-white/10 rounded-2xl text-white placeholder-zinc-600 text-4xl font-semibold transition-all duration-200">
                </div>
            </div>
            
            <!-- Summary -->
            <div class="bg-white/5 border border-white/10 rounded-2xl p-7 space-y-5">
                <div class="flex items-center justify-between text-zinc-300 text-sm">
                    <span class="flex items-center gap-2">
                        <i class="ph ph-wallet text-zinc-500"></i>Saldo atual
                    </span>
                    <span class="font-medium" th:text="'R$ ' + ${usuario.saldo}">R$ 12.548,75</span>
                </div>
                <div class="flex items-center justify-between text-zinc-300 text-sm">
                    <span class="flex items-center gap-2">
                        <i class="ph ph-coins text-zinc-500"></i>Taxa
                    </span>
                    <span class="font-medium">R$ 0,00</span>
                </div>
                <div class="border-t border-white/10 pt-5 flex items-center justify-between text-white">
                    <span class="font-medium">Saldo restante</span>
                    <span class="font-semibold text-xl" id="restante">R$ 12.548,75</span>
                </div>
            </div>
            
            <!-- Submit -->
            <button type="submit" class="w-full py-5 bg-primary text-white rounded-2xl font-semibold text-base transition-all duration-200 hover:bg-primary/90 hover:scale-[1.005]">
                Confirmar transferência
            </button>
        </form>
    </main>
    
    <script>
        document.getElementById('valor').addEventListener('input', () => {
            const v = parseFloat(document.getElementById('valor').value) || 0;
            const restante = 12548.75 - v;
            document.getElementById('restante').textContent = 
                'R$ ' + restante.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        });
    </script>
</body>
</html>
