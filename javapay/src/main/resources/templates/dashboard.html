<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaPay - Início</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { DEFAULT: '#820AD1' } },
                    boxShadow: { soft: '0 10px 60px -20px rgba(0,0,0,0.4)' }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #020617; }
        .input-focus:focus { 
            outline: none; 
            border-color: rgba(130,10,209,0.4);
            box-shadow: 0 0 0 4px rgba(130,10,209,0.1);
        }
    </style>
</head>
<body class="min-h-screen">
    
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-2xl border-b border-white/5">
        <div class="max-w-5xl mx-auto px-8 py-6">
            <div class="flex items-center justify-between">
                <a th:href="@{/dashboard}" class="flex items-center gap-4">
                    <div class="flex items-center justify-center w-12 h-12 rounded-2xl bg-white/5 border border-white/10">
                        <i class="ph ph-wallet text-2xl text-white"></i>
                    </div>
                    <span class="text-xl font-semibold text-white">JavaPay</span>
                </a>
                
                <div class="flex items-center gap-5">
                    <button class="p-3 rounded-2xl hover:bg-white/5 transition-colors">
                        <i class="ph ph-bell text-2xl text-zinc-400"></i>
                    </button>
                    <div class="flex items-center gap-4">
                        <div class="hidden md:block text-right">
                            <p class="text-sm font-semibold text-white" th:text="${usuario.nome}">Usuário</p>
                            <p class="text-xs text-zinc-500">Premium</p>
                        </div>
                        <div class="w-12 h-12 rounded-2xl bg-white/10 border border-white/10 flex items-center justify-center">
                            <i class="ph ph-user text-xl text-zinc-300"></i>
                        </div>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="p-3 rounded-2xl hover:bg-white/5 text-zinc-400 hover:text-red-400 transition-colors">
                                <i class="ph ph-sign-out text-xl"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main -->
    <main class="max-w-5xl mx-auto px-8 py-12">
        
        <!-- Balance Section -->
        <div class="mb-16">
            <p class="text-sm font-medium text-zinc-400 mb-3">Saldo disponível</p>
            <h1 class="text-5xl font-semibold text-white mb-8" th:text="'R$ ' + ${usuario.saldo}">R$ 12.548,75</h1>
            <a th:href="@{/transferencia}" class="inline-flex items-center gap-2 px-6 py-4 bg-primary text-white rounded-2xl font-semibold transition-all duration-200 hover:bg-primary/90 hover:scale-[1.005]">
                <i class="ph ph-paper-plane-tilt text-xl"></i>
                Nova transferência
            </a>
        </div>
        
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-7 transition-all duration-200 hover:bg-white/6">
                <div class="flex items-center justify-between mb-6">
                    <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center">
                        <i class="ph ph-trend-up text-2xl text-zinc-300"></i>
                    </div>
                </div>
                <p class="text-xs font-medium text-zinc-500 mb-2">Receitas</p>
                <p class="text-xl font-semibold text-white">R$ 8.420,00</p>
            </div>
            
            <div class="bg-white/5 border border-white/10 rounded-2xl p-7 transition-all duration-200 hover:bg-white/6">
                <div class="flex items-center justify-between mb-6">
                    <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center">
                        <i class="ph ph-trend-down text-2xl text-zinc-300"></i>
                    </div>
                </div>
                <p class="text-xs font-medium text-zinc-500 mb-2">Despesas</p>
                <p class="text-xl font-semibold text-white">R$ 3.150,50</p>
            </div>
            
            <div class="bg-white/5 border border-white/10 rounded-2xl p-7 transition-all duration-200 hover:bg-white/6">
                <div class="flex items-center justify-between mb-6">
                    <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center">
                        <i class="ph ph-arrows-left-right text-2xl text-zinc-300"></i>
                    </div>
                </div>
                <p class="text-xs font-medium text-zinc-500 mb-2">Volume</p>
                <p class="text-xl font-semibold text-white">124 transações</p>
            </div>
            
            <div class="bg-white/5 border border-white/10 rounded-2xl p-7 transition-all duration-200 hover:bg-white/6">
                <div class="flex items-center justify-between mb-6">
                    <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center">
                        <i class="ph ph-users text-2xl text-zinc-300"></i>
                    </div>
                </div>
                <p class="text-xs font-medium text-zinc-500 mb-2">Contatos</p>
                <p class="text-xl font-semibold text-white">48 pessoas</p>
            </div>
        </div>
        
        <!-- History -->
        <div>
            <h2 class="text-lg font-semibold text-white mb-6">Histórico</h2>
            <div class="space-y-4">
                <!-- Thymeleaf Items -->
                <div th:each="t : ${transferencias}" class="bg-white/5 border border-white/10 rounded-2xl p-6 flex items-center justify-between transition-all duration-200 hover:bg-white/6">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl bg-white/10 border border-white/10 flex items-center justify-center">
                            <i class="ph ph-arrow-up-right text-2xl text-zinc-400"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-white" th:text="${t.destinatario}">João Pereira</p>
                            <p class="text-xs text-zinc-500" th:text="${#temporals.format(t.data, 'dd/MM/yyyy HH:mm')}">02/07 14:32</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-semibold text-white" th:text="'R$ ' + ${t.valor}">R$ 250,00</p>
                    </div>
                </div>
                
                <!-- Sample Items -->
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6 flex items-center justify-between transition-all duration-200 hover:bg-white/6">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl bg-white/10 border border-white/10 flex items-center justify-center">
                            <i class="ph ph-arrow-down-left text-2xl text-zinc-400"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-white">Maria Silva</p>
                            <p class="text-xs text-zinc-500">01/07 09:15</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-semibold text-white">+R$ 500,00</p>
                    </div>
                </div>
                
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6 flex items-center justify-between transition-all duration-200 hover:bg-white/6">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl bg-white/10 border border-white/10 flex items-center justify-center">
                            <i class="ph ph-arrow-up-right text-2xl text-zinc-400"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-white">Netflix</p>
                            <p class="text-xs text-zinc-500">30/06 18:45</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-semibold text-zinc-300">-R$ 39,90</p>
                    </div>
                </div>
            </div>
        </div>
        
    </main>
</body>
</html>
